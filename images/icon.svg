<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="1024"
     height="1024">

    <defs>

        <radialGradient id="bg" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#151515"/>
            <stop offset="100%" stop-color="#050505"/>
        </radialGradient>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <!-- Background -->

    <circle cx="128" cy="128" r="116"
            fill="url(#bg)"
            stroke="#333"
            stroke-width="4"/>

    <!-- Rotating Ring -->

    <g filter="url(#glow)">
        <circle cx="128" cy="128" r="92"
                fill="none"
                stroke="#ffffff22"
                stroke-width="3"
                stroke-dasharray="10 12">
            <animateTransform
                attributeName="transform"
                type="rotate"
                from="0 128 128"
                to="360 128 128"
                dur="12s"
                repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Tokens -->

    <g filter="url(#glow)">

        <circle cx="128" cy="48" r="16" fill="#ff2a5f">
            <animate attributeName="r"
                     values="15;18;15"
                     dur="1.8s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="208" cy="128" r="16" fill="#0df0a3">
            <animate attributeName="r"
                     values="15;18;15"
                     begin=".4s"
                     dur="1.8s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="128" cy="208" r="16" fill="#0ea5e9">
            <animate attributeName="r"
                     values="15;18;15"
                     begin=".8s"
                     dur="1.8s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="48" cy="128" r="16" fill="#facc15">
            <animate attributeName="r"
                     values="15;18;15"
                     begin="1.2s"
                     dur="1.8s"
                     repeatCount="indefinite"/>
        </circle>

    </g>

    <!-- Dice -->

    <g filter="url(#glow)">

        <rect x="84"
              y="84"
              width="88"
              height="88"
              rx="18"
              fill="#111"
              stroke="#fff"
              stroke-width="3">

            <animateTransform
                attributeName="transform"
                type="rotate"
                values="-6 128 128;6 128 128;-6 128 128"
                dur="2.5s"
                repeatCount="indefinite"/>

        </rect>

        <circle cx="128" cy="128" r="8" fill="white">
            <animate attributeName="opacity"
                     values="1;.3;1"
                     dur="1.2s"
                     repeatCount="indefinite"/>
        </circle>

    </g>

</svg>