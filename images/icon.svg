<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024"
     height="1024"
     viewBox="0 0 256 256">

    <defs>
        <radialGradient id="bg" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#1b1b1b"/>
            <stop offset="100%" stop-color="#050505"/>
        </radialGradient>
    </defs>

    <!-- Background -->
    <circle
        cx="128"
        cy="128"
        r="118"
        fill="url(#bg)"
        stroke="#2f2f2f"
        stroke-width="4"/>

    <!-- Outer Ring -->
    <circle
        cx="128"
        cy="128"
        r="94"
        fill="none"
        stroke="#3f3f3f"
        stroke-width="4"/>

    <!-- Tokens -->
    <circle cx="128" cy="44" r="15" fill="#ff2a5f"/>
    <circle cx="212" cy="128" r="15" fill="#0df0a3"/>
    <circle cx="128" cy="212" r="15" fill="#0ea5e9"/>
    <circle cx="44" cy="128" r="15" fill="#facc15"/>

    <!-- Dice -->
    <rect
        x="84"
        y="84"
        width="88"
        height="88"
        rx="18"
        fill="#111111"
        stroke="#ffffff"
        stroke-width="4"/>

    <!-- Dice Dots -->
    <circle cx="106" cy="106" r="6" fill="white"/>
    <circle cx="150" cy="106" r="6" fill="white"/>
    <circle cx="128" cy="128" r="6" fill="white"/>
    <circle cx="106" cy="150" r="6" fill="white"/>
    <circle cx="150" cy="150" r="6" fill="white"/>

</svg>