<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Neon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

        <link rel="manifest" href="manifest.json">

<!-- 🔥 Title -->
<title>Ludo Neon: Arena</title>

<!-- 📱 SEO -->
<meta name="title" content="Ludo Neon: Arena">
<meta name="description" content="Play Ludo Neon: Arena – a modern neon-style Ludo game with AI, smooth animations, and immersive gameplay.">

<!-- 🌐 Open Graph (for WhatsApp, Instagram, etc.) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Ludo Neon: Arena">
<meta property="og:description" content="Experience Ludo like never before with neon visuals and smooth gameplay.">
<meta property="og:image" content="https://krishnaxeditzs.github.io/ludo-neon/preview.jpg">
<meta property="og:url" content="https://krishnaxeditzs.github.io/ludo-neon/">

<!-- 🐦 Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ludo Neon: Arena">
<meta name="twitter:description" content="Play a stunning neon version of Ludo with AI and smooth gameplay.">
<meta name="twitter:image" content="https://krishnaxeditzs.github.io/ludo-neon/preview.jpg">

<!-- 🎨 Theme -->
<meta name="theme-color" content="#000000">


<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9292376897272483"
     crossorigin="anonymous"></script>
    
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
    
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Screen 1: Setup -->
    <div id="setup-screen" class="w-full max-w-md bg-[#09090b] border border-[#27272a] p-8 rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <!-- Update 1 Applied here: Thin White Neon Title -->
        <h1 class="text-4xl text-center mb-8 tracking-tighter">
            <span class="font-black text-white">LUDO</span> 
            <span class="neon-title-thin">NEON</span>
        </h1>
        
        <div class="space-y-4">
            <div class="color-card red flex justify-between items-center">
                <span class="font-bold text-red-400 text-lg">Red Player</span>
                <select id="p-red" class="bg-black border border-zinc-800 text-white rounded-lg p-2 outline-none focus:border-red-500">
                    <option value="human">Human</option>
                    <option value="ai">AI</option>
                    <option value="none">None</option>
                </select>
            </div>
            <div class="color-card green flex justify-between items-center">
                <span class="font-bold text-green-400 text-lg">Green Player</span>
                <select id="p-green" class="bg-black border border-zinc-800 text-white rounded-lg p-2 outline-none focus:border-green-500">
                    <option value="human">Human</option>
                    <option value="ai">AI</option>
                    <option value="none">None</option>
                </select>
            </div>
            <div class="color-card blue flex justify-between items-center">
                <span class="font-bold text-blue-400 text-lg">Blue Player</span>
                <select id="p-blue" class="bg-black border border-zinc-800 text-white rounded-lg p-2 outline-none focus:border-blue-500">
                    <option value="ai">AI</option>
                    <option value="human">Human</option>
                    <option value="none">None</option>
                </select>
            </div>
            <div class="color-card yellow flex justify-between items-center">
                <span class="font-bold text-yellow-400 text-lg">Yellow Player</span>
                <select id="p-yellow" class="bg-black border border-zinc-800 text-white rounded-lg p-2 outline-none focus:border-yellow-500">
                    <option value="ai">AI</option>
                    <option value="human">Human</option>
                    <option value="none">None</option>
                </select>
            </div>
        </div>
        
        <p id="setup-err" class="text-red-400 text-sm mt-4 text-center hidden">Need at least 2 players!</p>
        <button onclick="startGame()" class="w-full mt-8 bg-white text-black hover:bg-zinc-200 font-black py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] uppercase tracking-widest">
            ENTER THE ARENA
        </button>
    </div>

    <!-- Screen 2: Game -->
    <div id="game-screen" class="hidden w-full max-w-5xl flex flex-col lg:flex-row gap-8 items-center justify-center">
        <!-- Board Area -->
        <div class="flex-1 w-full flex justify-center">
            <div class="board-container">
                <div id="board" class="ludo-grid"></div>
                <div id="tokens-layer"></div>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="w-full lg:w-72 bg-[#09090b] border border-[#27272a] p-6 rounded-2xl shadow-2xl flex flex-col items-center">
            <div id="turn-card" class="w-full p-4 rounded-xl mb-4 text-center bg-black border border-[#333]">
                <h2 id="turn-indicator" class="text-xl font-black transition-all duration-300 uppercase">PLAYER TURN</h2>
            </div>
            
            <p id="game-log" class="text-sm text-slate-500 mb-6 text-center h-12 italic">Initializing...</p>

            <button id="dice-btn" class="dice-btn w-full py-6 rounded-2xl shadow-xl mb-6 flex flex-col items-center gap-4 group" onclick="handleDiceClick()">
                <div id="dice-visual" class="dice-face group-hover:border-white transition-colors">
                    <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
                    <div class="dot hidden"></div><div class="dot"></div><div class="dot hidden"></div>
                    <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
                </div>
                <span class="font-black text-xs tracking-widest text-slate-400 group-hover:text-white">ROLL SYSTEM</span>
            </button>

            <div class="volume-control">
    <label>VOLUME</label>
    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
</div>

            <button onclick="togglePause()" class="w-full mb-3 bg-yellow-400 text-black font-bold py-2 rounded-xl">
            ⏸️ PAUSE
            </button>

         <button id="sound-btn" onclick="toggleSound()" class="w-full mb-4 bg-white text-black font-bold py-2 rounded-xl">
            🔊 SOUND   ON
         </button>

            <button id="bgm-btn" onclick="toggleBGM()" class="game-btn w-full mb-4 bg-black text-cyan-400 font-bold py-2 rounded-xl">
    🎵 MUSIC ON
</button>

            <!-- Rankings -->
            <div class="w-full bg-[#050505] border border-[#27272a] rounded-xl p-4">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest border-b border-[#222] pb-2 mb-3">Leaderboard</h3>
                <ul id="rankings-list" class="text-sm space-y-2">
                    <li class="italic text-slate-700">Arena empty.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Screen 3: Result -->
    <div id="result-screen" class="hidden w-full max-w-md bg-[#09090b] border border-[#27272a] p-8 rounded-3xl shadow-2xl text-center">
        <div class="mb-4 flex justify-center">
            <svg class="w-20 h-20 text-yellow-400 filter drop-shadow-[0_0_10px_#facc15]" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
        </div>
        <h1 class="text-4xl font-black text-white mb-2 uppercase">VICTORY</h1>
        <p class="text-slate-500 mb-8 uppercase tracking-widest text-xs">Battle Finalized</p>
        <div id="final-rankings" class="space-y-3 mb-8"></div>
        <button onclick="location.reload()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-zinc-200 transition-colors">
            NEW GAME
        </button>
    </div>

    <script src="script.js" defer></script>

    <div id="pause-screen" class="hidden fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-50">
    <h1 class="text-3xl text-white font-black mb-6">PAUSED</h1>

    <button onclick="togglePause()" class="mb-4 px-6 py-3 bg-white text-black rounded-xl font-bold">
        RESUME
    </button>

    <button onclick="location.reload()" class="px-6 py-3 bg-red-500 text-white rounded-xl font-bold">
        EXIT GAME
    </button>
    </div>

</body>
</html>
